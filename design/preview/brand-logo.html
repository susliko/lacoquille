<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fff; padding: 24px; font-family: 'Plus Jakarta Sans', sans-serif; }
  .brand-block { padding-bottom: 18px; border-bottom: 1.5px solid #ece8e2; margin-bottom: 16px; }
  .brand-name { font-family: 'Bricolage Grotesque', sans-serif; font-size: 2.2rem; font-weight: 800; letter-spacing: -0.03em; color: #1a1814; line-height: 1; }
  .brand-name span { color: #ff4757; }
  .brand-sub { font-size: 0.82rem; color: #6b6560; margin-top: 6px; }
  .tagline { font-size: 1rem; color: #6b6560; font-style: italic; }
  .note { font-size: 10px; color: #a09890; margin-top: 10px; line-height: 1.6; }
  .chips { display: flex; gap: 8px; margin-top: 12px; }
  .chip { padding: 4px 12px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
</style></head>
<body>
  <div class="brand-block">
    <div class="brand-name">La Coquille<span>.</span></div>
    <div class="brand-sub">le site d'apprentissage du français par immersion</div>
  </div>
  <div class="tagline">Not another boring drill site.</div>
  <div class="chips">
    <span class="chip" style="background:#fff0f1; color:#ff4757;">Free forever</span>
    <span class="chip" style="background:#eef1ff; color:#3d5af1;">Interactive</span>
    <span class="chip" style="background:#e8faf4; color:#00a370;">Visual</span>
  </div>
  <div class="note">Brand font: Bricolage Grotesque 800 · lowercase · letter-spacing -0.03em · coral dot accent</div>
</body></html>
