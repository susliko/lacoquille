<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fff; padding: 20px; font-family: 'Plus Jakarta Sans', sans-serif; }
  .section { margin-bottom: 14px; }
  .label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #a09890; margin-bottom: 8px; }
  .row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .mood-badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 999px; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
  .pill { display: inline-block; padding: 4px 12px; border: 1.5px solid #ddd8d0; border-radius: 999px; font-size: 0.8rem; color: #6b6560; font-weight: 500; }
  .eyebrow { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #ff4757; }
  .type-tag { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #a09890; }
  .learn-more { display: inline-flex; align-items: center; gap: 5px; font-size: 0.8rem; font-weight: 500; color: #6b6560; border: 1.5px solid #ddd8d0; border-radius: 5px; padding: 5px 12px; }
</style></head>
<body>
  <div class="section">
    <div class="label">Mood Badges</div>
    <div class="row">
      <span class="mood-badge" style="background:rgba(61,90,241,0.1); color:#3d5af1;">Indicatif</span>
      <span class="mood-badge" style="background:rgba(139,92,246,0.1); color:#8b5cf6;">Conditionnel</span>
      <span class="mood-badge" style="background:rgba(245,158,11,0.1); color:#d97706;">Subjonctif</span>
      <span class="mood-badge" style="background:rgba(0,196,140,0.1); color:#00a370;">Impératif</span>
    </div>
  </div>
  <div class="section">
    <div class="label">Related Tense Pills</div>
    <div class="row">
      <span class="pill">Imparfait</span>
      <span class="pill">Présent</span>
      <span class="pill">Plus-que-parfait</span>
    </div>
  </div>
  <div class="section">
    <div class="label">Labels & Links</div>
    <div class="row" style="gap:16px;">
      <span class="eyebrow">Grammaire française</span>
      <span class="type-tag">Tense · Past · Indicatif</span>
      <span class="learn-more">En savoir plus →</span>
    </div>
  </div>
</body></html>
