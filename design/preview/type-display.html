<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fff; padding: 24px; }
  .item { display: flex; align-items: baseline; gap: 14px; padding: 8px 0; border-bottom: 1.5px solid #ece8e2; }
  .item:last-child { border-bottom: none; }
  .specimen { font-family: 'Bricolage Grotesque', sans-serif; color: #1a1814; }
  .meta { font-size: 10px; color: #a09890; font-family: monospace; white-space: nowrap; flex-shrink: 0; width: 170px; }
</style></head>
<body>
  <div class="item">
    <div class="specimen" style="font-size:clamp(2.8rem,7vw,4.5rem); font-weight:800; line-height:1.1; letter-spacing:-0.03em;">La Grammaire</div>
    <div class="meta">hero · 800 · clamp 2.8–5rem</div>
  </div>
  <div class="item">
    <div class="specimen" style="font-size:clamp(2rem,5vw,3rem); font-weight:700; line-height:1.15; letter-spacing:-0.02em;">Le Passé Composé</div>
    <div class="meta">h1 · 700 · clamp 2–3rem</div>
  </div>
  <div class="item">
    <div class="specimen" style="font-size:clamp(1.3rem,3vw,1.7rem); font-weight:700; letter-spacing:-0.02em;">Quand l'utiliser</div>
    <div class="meta">h2 · 700</div>
  </div>
  <div class="item">
    <div class="specimen" style="font-size:1.2rem; font-weight:700;">Formation</div>
    <div class="meta">h3 · 700 · 1.2rem</div>
  </div>
  <div class="item">
    <div class="specimen" style="font-size:1.15rem; font-weight:700;">Les Verbes</div>
    <div class="meta">topic name · 700 · 1.15rem</div>
  </div>
  <div class="item">
    <div class="specimen" style="font-size:1.2rem; font-weight:800; letter-spacing:-0.02em;">La Coquille <span style="color:#ff4757;">.</span></div>
    <div class="meta">brand mark · 800</div>
  </div>
</body></html>
