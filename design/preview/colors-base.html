<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fff; font-family: 'Plus Jakarta Sans', sans-serif; padding: 20px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .swatch { flex: 1; min-width: 80px; border-radius: 8px; padding: 10px; display: flex; flex-direction: column; gap: 4px; }
  .swatch-color { width: 100%; height: 40px; border-radius: 6px; margin-bottom: 4px; }
  .label { font-size: 11px; font-weight: 600; color: #6b6560; letter-spacing: 0.04em; }
  .value { font-size: 10px; color: #a09890; font-family: monospace; }
  .group-title { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #a09890; margin-bottom: 8px; }
</style></head>
<body>
  <div class="group-title">Backgrounds & Surfaces</div>
  <div class="row">
    <div class="swatch">
      <div class="swatch-color" style="background:#ffffff; border:1.5px solid #ece8e2;"></div>
      <div class="label">--bg</div><div class="value">#ffffff</div>
    </div>
    <div class="swatch">
      <div class="swatch-color" style="background:#f7f5f2; border:1.5px solid #ece8e2;"></div>
      <div class="label">--surface</div><div class="value">#f7f5f2</div>
    </div>
    <div class="swatch">
      <div class="swatch-color" style="background:#f0ece6;"></div>
      <div class="label">--surface-2</div><div class="value">#f0ece6</div>
    </div>
    <div class="swatch">
      <div class="swatch-color" style="background:#e8e3db;"></div>
      <div class="label">--surface-3</div><div class="value">#e8e3db</div>
    </div>
  </div>
  <div class="group-title">Borders</div>
  <div class="row">
    <div class="swatch">
      <div class="swatch-color" style="background:#ece8e2;"></div>
      <div class="label">--border-subtle</div><div class="value">#ece8e2</div>
    </div>
    <div class="swatch">
      <div class="swatch-color" style="background:#ddd8d0;"></div>
      <div class="label">--border</div><div class="value">#ddd8d0</div>
    </div>
    <div class="swatch">
      <div class="swatch-color" style="background:#b8b0a5;"></div>
      <div class="label">--border-bright</div><div class="value">#b8b0a5</div>
    </div>
  </div>
</body></html>
