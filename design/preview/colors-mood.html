<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fff; font-family: 'Plus Jakarta Sans', sans-serif; padding: 20px; }
  .row { display: flex; gap: 10px; }
  .card { flex: 1; border: 1.5px solid #ece8e2; border-radius: 10px; overflow: hidden; }
  .card-bar { height: 5px; }
  .card-body { padding: 10px 14px; }
  .card-name { font-family: 'Bricolage Grotesque', sans-serif; font-size: 15px; font-weight: 700; margin-bottom: 2px; }
  .card-token { font-size: 10px; color: #a09890; font-family: monospace; }
</style></head>
<body>
  <div class="row">
    <div class="card">
      <div class="card-bar" style="background:#3d5af1;"></div>
      <div class="card-body">
        <div class="card-name" style="color:#3d5af1;">Indicatif</div>
        <div class="card-token">--indicatif · #3d5af1</div>
      </div>
    </div>
    <div class="card">
      <div class="card-bar" style="background:#8b5cf6;"></div>
      <div class="card-body">
        <div class="card-name" style="color:#8b5cf6;">Conditionnel</div>
        <div class="card-token">--conditionnel · #8b5cf6</div>
      </div>
    </div>
    <div class="card">
      <div class="card-bar" style="background:#f59e0b;"></div>
      <div class="card-body">
        <div class="card-name" style="color:#f59e0b;">Subjonctif</div>
        <div class="card-token">--subjonctif · #f59e0b</div>
      </div>
    </div>
    <div class="card">
      <div class="card-bar" style="background:#00c48c;"></div>
      <div class="card-body">
        <div class="card-name" style="color:#00c48c;">Impératif</div>
        <div class="card-token">--imperatif · #00c48c</div>
      </div>
    </div>
  </div>
</body></html>
