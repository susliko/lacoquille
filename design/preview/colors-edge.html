<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fff; font-family: 'Plus Jakarta Sans', sans-serif; padding: 20px; }
  .row { display: flex; flex-direction: column; gap: 9px; }
  .edge-item { display: flex; align-items: center; gap: 14px; }
  .line-wrap { width: 60px; flex-shrink: 0; }
  .line { height: 3px; width: 100%; border-radius: 2px; }
  .name { font-size: 11px; font-weight: 600; }
  .desc { font-size: 10px; color: #a09890; }
</style></head>
<body>
  <div class="row">
    <div class="edge-item">
      <div class="line-wrap"><div class="line" style="background:#3d5af1;"></div></div>
      <div><div class="name" style="color:#3d5af1;">auxiliary-compound</div><div class="desc">solid — built from via avoir/être + PP</div></div>
    </div>
    <div class="edge-item">
      <div class="line-wrap"><div class="line" style="background:repeating-linear-gradient(90deg,#ff4757 0 7px,transparent 7px 11px);"></div></div>
      <div><div class="name" style="color:#ff4757;">aspect-pair</div><div class="desc">dashed 7·4 — ongoing vs completed</div></div>
    </div>
    <div class="edge-item">
      <div class="line-wrap"><div class="line" style="background:repeating-linear-gradient(90deg,#ffb703 0 3px,transparent 3px 6px);"></div></div>
      <div><div class="name" style="color:#c48a00;">stem-share</div><div class="desc">dotted 3·3 — same infinitive stem</div></div>
    </div>
    <div class="edge-item">
      <div class="line-wrap"><div class="line" style="background:repeating-linear-gradient(90deg,#8b5cf6 0 11px,transparent 11px 16px);"></div></div>
      <div><div class="name" style="color:#8b5cf6;">mood-swap</div><div class="desc">dashed 11·5 — same time, different mood</div></div>
    </div>
    <div class="edge-item">
      <div class="line-wrap"><div class="line" style="background:repeating-linear-gradient(90deg,#94a3b8 0 4px,transparent 4px 7px);"></div></div>
      <div><div class="name" style="color:#94a3b8;">anteriority</div><div class="desc">dashed 4·3 — temporal sequence</div></div>
    </div>
  </div>
</body></html>
