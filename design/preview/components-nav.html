<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #ffffff; }
  nav {
    background: #ffffff;
    border-bottom: 1px solid #e8ecf2;
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: -0.01em;
    color: #4f46e5;
    cursor: pointer;
  }
  .divider { width: 1px; height: 18px; background: #e8ecf2; margin: 0 4px; }
  .nav-links { display: flex; align-items: center; gap: 2px; list-style: none; padding: 0; }
  .nav-links a {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    font-weight: 400;
    color: #6b7280;
    padding: 6px 12px;
    border-radius: 8px;
    transition: background 0.15s, color 0.15s;
  }
  .nav-links a.active {
    background: #eef1fb;
    color: #4f46e5;
    font-weight: 500;
  }
  .nav-links a:hover:not(.active) { background: #f6f8ff; color: #111827; }
  .breadcrumb {
    display: flex; align-items: center; gap: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem; color: #9ca3af; flex: 1;
  }
  .breadcrumb .sep { color: #d1d9ee; }
  .breadcrumb .current { color: #374151; font-weight: 500; }
  .cta {
    margin-left: auto;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem; font-weight: 500;
    background: #4f46e5; color: white;
    padding: 6px 14px; border-radius: 8px;
    border: none; cursor: pointer;
  }
</style></head>
<body>
  <nav>
    <div class="brand">La Coquille</div>
    <div class="divider"></div>
    <ul class="nav-links">
      <li><a href="#" class="active">Verbes</a></li>
      <li><a href="#">Pronoms</a></li>
      <li><a href="#">Adjectifs</a></li>
      <li><a href="#">Articles</a></li>
    </ul>
    <div class="breadcrumb" style="margin-left: 16px;">
      <span><a href="#" style="color:#9ca3af; text-decoration:none;">Verbes</a></span>
      <span class="sep">/</span>
      <span class="current">Passé composé</span>
    </div>
    <button class="cta">Commencer →</button>
  </nav>
</body></html>
