<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fff; font-family: 'Plus Jakarta Sans', sans-serif; padding: 20px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .swatch { flex: 1; min-width: 90px; border-radius: 10px; overflow: hidden; border: 1.5px solid #ece8e2; }
  .block { height: 48px; }
  .info { padding: 8px 10px; }
  .name { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
  .token { font-size: 10px; color: #a09890; font-family: monospace; }
</style></head>
<body>
  <div class="row">
    <div class="swatch">
      <div class="block" style="background:#ff4757;"></div>
      <div class="info"><div class="name" style="color:#ff4757;">Coral</div><div class="token">--coral · #ff4757</div></div>
    </div>
    <div class="swatch">
      <div class="block" style="background:#3d5af1;"></div>
      <div class="info"><div class="name" style="color:#3d5af1;">Indigo</div><div class="token">--indigo · #3d5af1</div></div>
    </div>
    <div class="swatch">
      <div class="block" style="background:#00c48c;"></div>
      <div class="info"><div class="name" style="color:#00c48c;">Emerald</div><div class="token">--emerald · #00c48c</div></div>
    </div>
    <div class="swatch">
      <div class="block" style="background:#ffb703;"></div>
      <div class="info"><div class="name" style="color:#c48a00;">Amber</div><div class="token">--amber · #ffb703</div></div>
    </div>
    <div class="swatch">
      <div class="block" style="background:#8b5cf6;"></div>
      <div class="info"><div class="name" style="color:#8b5cf6;">Violet</div><div class="token">--violet · #8b5cf6</div></div>
    </div>
  </div>
</body></html>
