app = "lacoquille"
primary_region = "iad"

[build]
dockerfile = "Dockerfile"

[env]
PORT = "8080"

[vm]
memory = "256mb"
cpu_kind = "shared"
cpus = 1

[[services]]
internal_port = 8080
protocol = "tcp"
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 0

  [[services.http_checks]]
    interval = "10s"
    timeout = "5s"
    path = "/health"