app = "lacoquille"
primary_region = "lhr"

[build]
dockerfile = "Dockerfile"

[env]
PORT = "8080"

[vm]
memory = "256mb"
cpu_kind = "shared"
cpus = 1

[http_service]
  internal_port = 8080
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "10s"
    timeout = "5s"
    path = "/health"
